<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Product List</title>
    <!-- Bootstrap 5.3 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .product-img {
            width: 60px;
            height: 60px;
            object-fit: contain;           /* Keeps image ratios clean without distortion */
            background-color: #fff;
            padding: 4px;
            border: 1px solid #dee2e6;
            border-radius: 4px;
        }
    </style>
</head>
<body>
<a href="/addProductForm" class="btn btn-secondary mt-3 ml-5">Add Product</a>
<a href="/saveUserForm" class="btn btn-secondary mt-3 ml-5">Add User</a>
<div class="container mt-5">
    <h2 class="mb-4 text-center">Product List</h2>
	
    <div class="table-responsive">
        <table class="table table-bordered table-hover align-middle text-center">
            <thead class="table-dark">
                <tr>
                    <th scope="col">ID</th>
                    <th scope="col">Image</th>
                    <th scope="col">Product Title</th>
                    <th scope="col">Product Description</th>
                    <th scope="col">Product Category</th>
                    <th scope="col">Product Price</th>
                    <th scope="col">Update</th>
                    <th scope="col">Delete</th>
                </tr>
            </thead>
            <tbody>
					<tr th:each="product : ${products}">
						<td th:text="${product.id}" class="fw-bold text-muted"></td>
						<td><img
							th:src="${product.image != null && product.image != ''} ? ${product.image} : 'https://images.unsplash.com/photo-1531403009284-440f080d1e12?auto=format&fit=crop&w=100&q=80'"
							alt="Product Image" class="product-img"></td>
						<td th:text="${product.title}"></td>
						<td th:text="${product.description}"></td>
						<td th:text="${product.category}"></td>
						<td th:text="'₹' +${product.price}"></td>

						<td><a th:href="@{'/updateProductForm/' + ${product.id}}"
							class="btn btn-primary btn-sm"
							onclick="return confirm('Are you sure you want to update this Product?');">Update
						</a></td>
						<td><a th:href="@{'/deleteProductFE/' + ${product.id}}"
							class="btn btn-danger btn-sm"
							onclick="return confirm('Are you sure you want to delete this Product?');">Delete
						</a></td>

					</tr>
				</tbody>
        </table>
    </div>
</div>

<!-- Bootstrap JS Bundle (optional for dropdowns, modals, etc.) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
