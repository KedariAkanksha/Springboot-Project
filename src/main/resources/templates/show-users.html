<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>User List</title>
<!-- Bootstrap 5.3 CDN -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>
<body>
	<div class="container mt-5">
		<h2 class="mb-4 text-center">User List</h2>

		<div class="table-responsive">
			<table
				class="table table-bordered table-hover align-middle text-center">
				<thead class="table-dark">
					<tr>
						<th scope="col">User ID</th>
						<th scope="col">User Name</th>
						<th scope="col">User Password</th>
						<th scope="col">Account Expiry Date</th>
						<th scope="col">Credentials Expiry Date</th>
						<th scope="col">Account Enabled Status</th>
						<th scope="col">Account Locked Status</th>
						<th scope="col">Delete</th>
						<th scope="col">Update</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="user : ${users}">
						<td th:text="${user.userid}"></td>
						<td th:text="${user.username}"></td>
						<td th:text="${user.password}"></td>
						<td><input type="date" th:value="${user.accExpiredDate}"
							class="form-control" disabled></td>
						<td><input type="date" th:value="${user.credExpiryDate}"
							class="form-control" disabled></td>
						<td>
							<div class="form-check form-switch">
								<input class="form-check-input" type="checkbox"
									th:checked="${user.accountEnabledStatus == 1}" disabled>
								<span
									th:text="${user.accountEnabledStatus == 1 ? 'Enabled' : 'Disabled'}"></span>
							</div>
						</td>

						<td>
							<div class="form-check form-switch">
								<input class="form-check-input" type="checkbox"
									th:checked="${user.accountLockedStatus == 1}" disabled>
								<span
									th:text="${user.accountLockedStatus == 1 ? 'Unlocked' : 'Locked'}"></span>
							</div>
						</td>
						<td><a th:href="@{'/deleteUserFE/' + ${user.userid}}"
							class="btn btn-danger btn-sm"
							onclick="return confirm('Are you sure you want to delete this User?');">Delete
						</a></td>
						<td><a th:href="@{'/updateUserForm/' + ${user.userid}}"
							class="btn btn-primary btn-sm"
							onclick="return confirm('Are you sure you want to Update this User?');">Update
						</a></td>

					</tr>
				</tbody>
			</table>
		</div>
	</div>

	<!-- Bootstrap JS Bundle (optional for dropdowns, modals, etc.) -->
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
