<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Update Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5" style="max-width: 600px;">
    <h2 class="mb-4 text-center fw-bold text-dark">Update Product Details</h2>

    <form th:action="@{/updateProductFE/{id}(id=${product.id})}" th:object="${product}" method="post" class="card p-4 shadow-sm bg-white">
        
        <div class="mb-3">
            <label for="productId" class="form-label fw-semibold">Product ID</label>
            <input type="text" th:field="*{id}" class="form-control bg-disabled" id="productId" readonly>
        </div>

        <div class="mb-3">
            <label for="title" class="form-label fw-semibold">Product Title</label>
            <input type="text" th:field="*{title}" class="form-control" id="title" placeholder="Enter title" required>
        </div>
        
        <div class="mb-3">
            <label for="desc" class="form-label fw-semibold">Description</label>
            <textarea th:field="*{description}" class="form-control" id="desc" rows="3" placeholder="Enter description" required></textarea>
        </div>
        
        <div class="mb-3">
            <label for="category" class="form-label fw-semibold">Category</label>
            <input type="text" th:field="*{category}" class="form-control" id="category" placeholder="Enter category" required>
        </div>
        
        <div class="mb-3">
            <label for="price" class="form-label fw-semibold">Price (₹)</label>
            <input type="number" th:field="*{price}" class="form-control" id="price" placeholder="Enter price" min="0" step="0.01" required>
        </div>

        <div class="mb-3">
            <label for="image" class="form-label fw-semibold">Product Image URL</label>
            <input type="url" th:field="*{image}" class="form-control" id="image" placeholder="https://example.com/image.jpg">
            <div class="form-text text-muted">Provide an updated web link for the product display asset.</div>
        </div>

        <div class="mt-4 pt-2 border-top">
            <button type="submit" class="btn btn-primary px-4">Update Product</button>
            <a th:href="@{/getAllProductsFE}" class="btn btn-secondary ms-2 px-4">Cancel</a>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
