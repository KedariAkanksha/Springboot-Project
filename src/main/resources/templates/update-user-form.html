<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Add Product</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>
<body>

	<div class="container mt-5">
		<h2 class="mb-4 text-center">Register New User</h2>

		<form th:action="@{'/updateUserFE/' + ${user.userid}}"
			th:object="${user}" method="post" class="card p-4 shadow-sm">

			<div class="mb-3">
				<label for="username" class="form-label">User name</label> <input
					type="text" th:field="*{username}" class="form-control"
					id="username" placeholder="Enter User name">
			</div>
			<div class="mb-3">
				<label for="password" class="form-label">New Password</label> <input
					type="password" th:field="*{password}" class="form-control"
					id="password" placeholder="Leave blank to keep existing password">
			</div>


			<div>
				<label for="aed" class="form-label">Account Expiry Date</label> <input
					type="date" name="accExpiredDate"
					th:value="${#temporals.format(user.accExpiredDate, 'yyyy-MM-dd')}"
					class="form-control" id="aed">
			</div>
			<div>
				<label for="ced" class="form-label">Credential Expiry Date</label> <input
					type="date" name="credExpiryDate"
					th:value="${#temporals.format(user.credExpiryDate, 'yyyy-MM-dd')}"
					class="form-control" id="ced">
			</div>

			<div class="form-check form-switch">
				<label for="aes" class="form-label">Account Enabled Status</label> <select
					th:field="*{accountEnabledStatus}" class="form-select">
					<option value="1">Enabled</option>
					<option value="0">Disabled</option>
				</select>
			</div>



			<div class="form-check form-switch">
				<label for="als" class="form-label">Account Locked Status</label> <select
					th:field="*{accountLockedStatus}" class="form-select">
					<option value="1">Unlocked</option>
					<option value="0">Locked</option>
				</select>
			</div>

			<div class="mb-3">

				<label class="form-label"> Select Roles </label>

				<div th:each="role : ${roles}" class="form-check">

					<input class="form-check-input" type="checkbox" th:field="*{roles}"
						th:value="${role.roleid}" /> <label class="form-check-label"
						th:text="${role.rolename}"> </label>

				</div>

			</div>

			<button type="submit" class="btn btn-success">Update User</button>
		</form>
	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
